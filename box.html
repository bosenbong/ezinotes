<!DOCTYPE html>
<html>
<head>
  <title>BeatBox</title>
</head>
<body style="background:#111;color:white;font-family:sans-serif;text-align:center;padding:50px;">
  <h1 style="color:#ff6b6b">🥁 BeatBox</h1>
  <p>Tap the buttons!</p>
  <button style="width:80px;height:80px;background:#ff6b6b;border:none;border-radius:10px;font-size:30px;margin:10px;" onclick="play(1)">🥁</button>
  <button style="width:80px;height:80px;background:#4ecdc4;border:none;border-radius:10px;font-size:30px;margin:10px;" onclick="play(2)">🎹</button>
  <button style="width:80px;height:80px;background:#ffe66d;border:none;border-radius:10px;font-size:30px;margin:10px;" onclick="play(3)">🎸</button>
  <button style="width:80px;height:80px;background:#95e1d3;border:none;border-radius:10px;font-size:30px;margin:10px;" onclick="play(4)">🔊</button>
  <script>
    function play(n) {
      let a = new AudioContext();
      let o = a.createOscillator();
      let g = a.createGain();
      o.connect(g); g.connect(a.destination);
      o.frequency.value = n==1?150:n==2?400:n==3?800:80;
      g.gain.value = 0.5;
      g.gain.exponentialRampToValueAtTime(0.01, a.currentTime + 0.3);
      o.start(); o.stop(a.currentTime + 0.3);
    }
  </script>
</body>
</html>

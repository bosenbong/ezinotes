<!DOCTYPE html>
<html>
<head>
  <title>FEVER 3D</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
  </style>
</head>
<body>
<script>
// 🎮 FEVER 3D - First Person
let gameState = "START";
let camX = 0, camY = 100, camZ = 0;
let camRotY = 0;
let moveSpeed = 3;
let lookSpeed = 0.03;
let playerY = 0;
let velocityY = 0;
let gravity = 0.5;
let jumpPower = 15;
let grounded = false;
let level = 1;
let deaths = 0;
let fever = 0;
let messages = [];
let inTrap = false;

const levelData = [];
const rages = ["I'M GETTING FEVER!", "STUPID PLAYER!", "YOU CAN'T BEAT ME!", "JUST GIVE UP!", "WHY WON'T YOU DIE?!", "FEEEEEEVER!!"];

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  generateLevel();
}

function generateLevel() {
  levelData.length = 0;
  
  // Floor
  for (let x = -500; x < 500; x += 50) {
    for (let z = -500; z < 500; z += 50) {
      if (random() < 0.15) {
        levelData.push({x, y: 0, z, w: 50, h: 50, type: "hole"}); // Hole!
      } else if (random() < 0.1) {
        levelData.push({x, y: 0, z, w: 50, h: 50, type: "lava"}); // LAVA!
      } else if (random() < 0.05) {
        levelData.push({x, y: 0, z, w: 50, h: 50, type: "fake"}); // Fake!
      } else {
        levelData.push({x, y: 0, z, w: 50, h: 50, type: "floor"});
      }
    }
  }
  
  // Platforms
  for (let i = 0; i < level + 5; i++) {
    levelData.push({
      x: random(-400, 400),
      y: -50 - i * 80,
      z: -400 + i * 150,
      w: 80,
      h: 80,
      type: random() < 0.3 ? "trap" : "platform"
    });
  }
  
  // Goal
  levelData.push({x: 0, y: -200 - level * 80, z: -450, w: 60, h: 60, type: "goal"});
}

function draw() {
  background(0);
  
  if (gameState === "START") {
    drawStartScreen();
  } else if (gameState === "PLAY") {
    playGame();
  }
}

function drawStartScreen() {
  textAlign(CENTER);
  textSize(60);
  fill(255, 50, 50);
  push();
  rotateY(frameCount * 0.01);
  text("FEVER 3D", 0, 0);
  pop();
  
  textSize(20);
  fill(200);
  text("First Person Rage Game", 0, 50);
  
  textSize(16);
  fill(150);
  text("WASD to move | Mouse to look | Space to jump", 0, 100);
  text("Click to start suffering", 0, 150);
}

function playGame() {
  // Lighting
  ambientLight(50);
  directionalLight(255, 200, 200, 0, -1, 0);
  
  // Camera setup
  rotateX(constrain(-mouseY * 0.001, -PI/3, PI/3));
  rotateY(-mouseX * 0.003 + camRotY);
  
  // Fever effect
  if (fever > 20) {
    let flash = random() < fever * 0.01;
    if (flash) background(255, 50, 50);
  }
  
  // Draw level
  for (let obj of levelData) {
    push();
    translate(obj.x, obj.y, obj.z);
    
    if (obj.type === "floor" || obj.type === "platform") {
      fill(100, 150, 255);
    } else if (obj.type === "hole") {
      fill(0);
      continue;
    } else if (obj.type === "lava") {
      fill(255, 100, 0);
    } else if (obj.type === "fake") {
      fill(100, 200, 255); // Looks safe!
    } else if (obj.type === "trap") {
      fill(255, 50, 100);
    } else if (obj.type === "goal") {
      fill(255, 215, 0);
    }
    
    box(obj.w, 10, obj.h);
    pop();
  }
  
  // Movement
  if (keyIsDown(87)) { // W
    camZ -= cos(camRotY) * moveSpeed;
    camX -= sin(camRotY) * moveSpeed;
  }
  if (keyIsDown(83)) { // S
    camZ += cos(camRotY) * moveSpeed;
    camX += sin(camRotY) * moveSpeed;
  }
  if (keyIsDown(65)) { // A
    camX -= cos(camRotY) * moveSpeed;
    camZ += sin(camRotY) * moveSpeed;
  }
  if (keyIsDown(68)) { // D
    camX += cos(camRotY) * moveSpeed;
    camZ -= sin(camRotY) * moveSpeed;
  }
  
  // Jump
  if (keyIsDown(32) && grounded) {
    velocityY = -jumpPower;
    grounded = false;
  }
  
  // Gravity
  velocityY += gravity;
  playerY += velocityY;
  
  // Ground collision
  grounded = false;
  for (let obj of levelData) {
    if (obj.type !== "floor" && obj.type !== "platform" && obj.type !== "goal") continue;
    
    if (camX > obj.x - obj.w/2 && camX < obj.x + obj.w/2 &&
        camZ > obj.z - obj.h/2 && camZ < obj.z + obj.h/2 &&
        playerY < obj.y - 5 && playerY > obj.y - 20) {
      
      if (obj.type === "floor" || obj.type === "platform") {
        playerY = obj.y - 10;
        velocityY = 0;
        grounded = true;
      }
    }
  }
  
  translate(0, playerY, 0);
  
  // Fall death
  if (playerY > 200) {
    die("fell into the void");
  }
  
  // UI
  camRotY = 0;
  
  // Fever bar
  push();
  resetMatrix();
  translate(-width/2 + 20, -height/2 + 30);
  fill(50);
  rect(0, 0, 200, 20);
  fill(255, 100, 100);
  rect(0, 0, fever * 4, 20);
  fill(255);
  textSize(12);
  text("FEVER: " + Math.floor(fever * 2) + "%", 5, 14);
  pop();
  
  // Messages
  for (let i = messages.length - 1; i >= 0; i--) {
    messages[i].timer--;
    if (messages[i].timer <= 0) {
      messages.splice(i, 1);
    } else {
      push();
      resetMatrix();
      textAlign(CENTER);
      textSize(24);
      fill(255, 255, 0);
      text(messages[i].text, width/2, height/3);
      pop();
    }
  }
  
  // Level
  push();
  resetMatrix();
  textSize(16);
  fill(200);
  text("Level " + level, width - 100, 30);
  text("Deaths: " + deaths, width - 100, 50);
  pop();
}

function die(reason) {
  deaths++;
  fever = min(fever + 3, 50);
  showMessage(random(rages));
  resetPosition();
}

function winLevel() {
  level++;
  showMessage("LUCKY!");
  generateLevel();
  resetPosition();
}

function resetPosition() {
  camX = 0;
  camZ = 0;
  playerY = 0;
  velocityY = 0;
}

function showMessage(msg) {
  messages.push({text: msg, timer: 120});
}

function keyPressed() {
  if (gameState === "START") {
    gameState = "PLAY";
    return;
  }
  
  // Look around
  if (key === 'a' || key === 'd') {
    camRotY = (key === 'a') ? lookSpeed : -lookSpeed;
  }
}

function mousePressed() {
  if (gameState === "START") {
    gameState = "PLAY";
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>

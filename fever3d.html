<!DOCTYPE html>
<html>
<head>
  <title>FEVER 3D</title>
  <style>
    body { margin: 0; background: #111; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #ff4444;
      font-size: 18px;
      z-index: 100;
    }
    
    #fever-bar {
      width: 200px;
      height: 20px;
      background: #333;
      border: 2px solid #ff4444;
      margin-top: 5px;
    }
    
    #fever-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff4444, #ff0000);
      width: 0%;
    }
    
    #message {
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      color: #ffff00;
      font-size: 32px;
      text-align: center;
      text-shadow: 2px 2px 0 #ff0000;
      display: none;
      z-index: 100;
    }
    
    #start-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    
    #start-screen h1 {
      color: #ff0000;
      font-size: 72px;
      text-shadow: 4px 4px 0 #880000;
      animation: shake 0.1s infinite;
    }
    
    #start-screen p {
      color: #888;
      font-size: 20px;
    }
    
    @keyframes shake {
      0% { transform: translate(1px, 1px) rotate(0deg); }
      25% { transform: translate(-1px, -2px) rotate(-1deg); }
      50% { transform: translate(-3px, 0px) rotate(1deg); }
      75% { transform: translate(3px, 2px) rotate(0deg); }
      100% { transform: translate(1px, -1px) rotate(-1deg); }
    }
    
    #crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
      z-index: 50;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: #fff;
    }
    #crosshair::before { width: 2px; height: 20px; left: 9px; }
    #crosshair::after { width: 20px; height: 2px; top: 9px; }
  </style>
</head>
<body>
  <div id="ui">
    <div>FEVER: <span id="fever-text">0%</span></div>
    <div id="fever-bar"><div id="fever-fill"></div></div>
    <div style="margin-top: 10px;">Level: <span id="level">1</span></div>
    <div>Deaths: <span id="deaths">0</span></div>
  </div>
  
  <div id="crosshair"></div>
  <div id="message"></div>
  
  <div id="start-screen">
    <h1>FEVER 3D</h1>
    <p>A game that hates you</p>
    <p style="margin-top: 30px;">WASD to move | Mouse to look | Space to jump</p>
    <p style="color: #ff4444; margin-top: 20px;">Click to start suffering</p>
  </div>

  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    let gameStarted = false;
    let pitch = 0;
    let yaw = 0;
    let posX = 0, posY = 0, posZ = 0;
    let velY = 0;
    let grounded = false;
    let fever = 0;
    let deaths = 0;
    let level = 1;
    
    let platforms = [];
    let traps = [];
    let lava = [];
    let goal = null;
    
    const keys = {};
    const rages = ["I'M GETTING FEVER!", "STUPID PLAYER!", "YOU CAN'T BEAT ME!", "JUST GIVE UP!", "WHY WON'T YOU DIE?!", "FEEEEEEVER!!"];
    
    document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    
    document.addEventListener('click', () => {
      if (!gameStarted) {
        gameStarted = true;
        document.getElementById('start-screen').style.display = 'none';
        canvas.requestPointerLock();
        initLevel();
      }
    });
    
    document.addEventListener('mousemove', e => {
      if (document.pointerLockElement === canvas) {
        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;
        pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
      }
    });
    
    function initLevel() {
      platforms = [];
      traps = [];
      lava = [];
      
      // Floor with holes
      for (let x = -20; x <= 20; x++) {
        for (let z = -20; z <= 20; z++) {
          let r = Math.random();
          if (r < 0.1) {
            // Hole!
          } else if (r < 0.2) {
            lava.push({x: x * 100, z: z * 100});
          } else if (r < 0.25) {
            traps.push({x: x * 100, z: z * 100, move: Math.random() < 0.3});
          } else {
            platforms.push({x: x * 100, z: z * 100});
          }
        }
      }
      
      // Floating platforms
      for (let i = 0; i < level + 4; i++) {
        let py = -80 - i * 100;
        let pz = -200 - i * 180;
        platforms.push({
          x: Math.random() * 300 - 150,
          z: pz,
          y: py,
          move: Math.random() < 0.3
        });
      }
      
      // Goal
      goal = {x: 0, y: -300 - level * 100, z: -500};
    }
    
    function showMessage(text) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 2000);
    }
    
    function update() {
      if (!gameStarted) return;
      
      const speed = 5;
      let forward = 0, strafe = 0;
      
      if (keys['w']) forward += speed;
      if (keys['s']) forward -= speed;
      if (keys['a']) strafe -= speed;
      if (keys['d']) strafe += speed;
      
      // Move in direction we're facing
      posX += Math.sin(yaw) * forward + Math.cos(yaw) * strafe;
      posZ += Math.cos(yaw) * forward - Math.sin(yaw) * strafe;
      
      // Jump
      if (keys[' '] && grounded) {
        velY = -15;
        grounded = false;
      }
      
      // Gravity
      velY += 0.8;
      posY += velY;
      
      // Ground collision
      grounded = false;
      
      // Check floor
      if (posY >= 0) {
        for (let l of lava) {
          if (Math.abs(posX - l.x) < 50 && Math.abs(posZ - l.z) < 50) {
            die("LAVA!");
            return;
          }
        }
        
        for (let t of traps) {
          if (Math.abs(posX - t.x) < 50 && Math.abs(posZ - t.z) < 50) {
            die("TRAP!");
            return;
          }
        }
        
        if (Math.random() < 0.1) {
          // Random trap floor!
        } else {
          posY = 0;
          velY = 0;
          grounded = true;
        }
      }
      
      // Platform collision
      for (let p of platforms) {
        if (p.y !== undefined) { // Floating platform
          if (Math.abs(posX - p.x) < 50 && Math.abs(posZ - p.z) < 50 &&
              posY < p.y + 10 && posY > p.y - 20 && velY >= 0) {
            posY = p.y;
            velY = 0;
            grounded = true;
          }
          
          if (p.move) {
            p.x += Math.sin(Date.now() * 0.003) * 2;
          }
        }
      }
      
      // Goal
      if (goal && Math.abs(posX - goal.x) < 40 && Math.abs(posZ - goal.z) < 40 && posY < goal.y + 50) {
        level++;
        showMessage("LEVEL " + level + "!");
        posX = 0; posY = 0; posZ = 0;
        initLevel();
      }
      
      // Fall death
      if (posY > 300) {
        die("FELL OFF!");
      }
      
      // Update UI
      document.getElementById('fever-fill').style.width = fever + '%';
      document.getElementById('fever-text').textContent = Math.floor(fever * 2) + '%';
      document.getElementById('level').textContent = level;
      document.getElementById('deaths').textContent = deaths;
    }
    
    function die(reason) {
      deaths++;
      fever = Math.min(fever + 5, 50);
      showMessage(rages[Math.floor(Math.random() * rages.length)]);
      posX = 0; posY = 0; posZ = 0;
      velY = 0;
    }
    
    function render() {
      // Clear with fever effect
      ctx.fillStyle = fever > 20 && Math.random() < fever * 0.01 ? '#440000' : '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      if (!gameStarted) return;
      
      ctx.save();
      ctx.translate(canvas.width/2, canvas.height/2);
      
      // 3D projection
      let cosY = Math.cos(yaw);
      let sinY = Math.sin(yaw);
      let cosP = Math.cos(pitch);
      let sinP = Math.sin(pitch);
      
      function project(x, y, z) {
        // Rotate
        let x1 = x * cosY - z * sinY;
        let z1 = x * sinY + z * cosY;
        let y1 = y * cosP - z1 * sinP;
        let z2 = y * sinP + z1 * cosP;
        
        // Perspective
        let scale = 400 / (z2 + 500);
        return {
          x: x1 * scale + canvas.width/2,
          y: y1 * scale + canvas.height/2,
          scale: scale
        };
      }
      
      // Draw platforms
      ctx.fillStyle = '#4488ff';
      for (let p of platforms) {
        let py = p.y !== undefined ? p.y : 0;
        let proj = project(p.x - posX, py - posY, p.z - posZ);
        if (proj.scale > 0) {
          ctx.fillRect(proj.x - 40 * proj.scale, proj.y - 10 * proj.scale, 80 * proj.scale, 20 * proj.scale);
        }
      }
      
      // Draw lava
      ctx.fillStyle = '#ff4400';
      for (let l of lava) {
        let proj = project(l.x - posX, 0 - posY, l.z - posZ);
        if (proj.scale > 0) {
          ctx.fillRect(proj.x - 40 * proj.scale, proj.y - 5 * proj.scale, 80 * proj.scale, 15 * proj.scale);
        }
      }
      
      // Draw traps
      ctx.fillStyle = '#ff0066';
      for (let t of traps) {
        let proj = project(t.x - posX, 0 - posY, t.z - posZ);
        if (proj.scale > 0) {
          ctx.fillRect(proj.x - 30 * proj.scale, proj.y - 8 * proj.scale, 60 * proj.scale, 15 * proj.scale);
        }
      }
      
      // Draw goal
      if (goal) {
        ctx.fillStyle = '#ffdd00';
        let proj = project(goal.x - posX, goal.y - posY, goal.z - posZ);
        if (proj.scale > 0) {
          ctx.fillRect(proj.x - 30 * proj.scale, proj.y - 30 * proj.scale, 60 * proj.scale, 60 * proj.scale);
        }
      }
      
      ctx.restore();
    }
    
    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }
    
    loop();
  </script>
</body>
</html>

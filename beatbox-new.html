<!DOCTYPE html>
<html>
<head>
  <title>Beat box - Voice Mode</title>
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
    }
    h1 { color: #fff; margin-bottom: 10px; }
    p { color: #888; margin-bottom: 30px; }
    .pad-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .pad {
      width: 120px;
      height: 120px;
      border-radius: 20px;
      border: none;
      font-size: 40px;
      cursor: pointer;
      transition: all 0.1s;
      box-shadow: 0 8px 0 rgba(0,0,0,0.3);
    }
    .pad:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 rgba(0,0,0,0.3);
    }
    .pad1 { background: #ff6b6b; color: white; }
    .pad2 { background: #4ecdc4; color: white; }
    .pad3 { background: #ffe66d; color: #333; }
    .pad4 { background: #95e1d3; color: #333; }
    
    .controls { margin-top: 30px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
    button.btn {
      padding: 15px 30px;
      border-radius: 10px;
      border: none;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }
    .play-btn { background: #4ecdc4; color: white; }
    .stop-btn { background: #ff6b6b; color: white; }
    .clear-btn { background: #666; color: white; }
    .voice-btn { background: #9b59b6; color: white; }
    .voice-btn.recording { background: #e74c3c; animation: pulse 0.5s infinite; }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .recording { margin-top: 20px; color: #ff6b6b; font-size: 18px; display: none; }
    .voice-status { margin-top: 20px; color: #9b59b6; font-size: 18px; display: none; }
    
    .info { color: #666; font-size: 14px; margin-top: 20px; max-width: 300px; text-align: center; }
  </style>
</head>
<body>
  <h1>🥁 Beat Box</h1>
  <p>Tap pads OR use voice to make beats!</p>
  
  <div class="pad-container">
    <button class="pad pad1" onclick="playSound(1)">🥁</button>
    <button class="pad pad2" onclick="playSound(2)">🎹</button>
    <button class="pad pad3" onclick="playSound(3)">🎸</button>
    <button class="pad pad4" onclick="playSound(4)">🔊</button>
  </div>
  
  <div class="controls">
    <button class="btn play-btn" onclick="playBeat()">▶ Play</button>
    <button class="btn stop-btn" onclick="stopBeat()">⏹ Stop</button>
    <button class="btn clear-btn" onclick="clearPattern()">🗑 Clear</button>
    <button class="btn voice-btn" id="voiceBtn" onclick="toggleVoice()">🎤 Voice</button>
  </div>
  
  <div class="recording" id="recording">● Recording your beat...</div>
  <div class="voice-status" id="voiceStatus">🎤 Listening... Make sounds!</div>
  <p class="info">Tap "Voice" then clap, tap, or say "boom boom" to turn sounds into beats!</p>

  <script>
    let audioCtx = null;
    let pattern = [];
    let isPlaying = false;
    let beatInterval = null;
    let currentBeat = 0;
    
    // Voice detection
    let mediaStream = null;
    let analyser = null;
    let voiceListening = false;
    let lastTrigger = 0;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }
    
    function playSound(num) {
      initAudio();
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      if (num === 1) { // Kick
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        gain.gain.setValueAtTime(1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      } else if (num === 2) { // Snare
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      } else if (num === 3) { // Hi-hat
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      } else if (num === 4) { // Bass
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(80, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      }
      
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.5);
      
      pattern.push(num);
      updateDisplay();
    }
    
    function updateDisplay() {
      document.getElementById('recording').style.display = pattern.length > 0 ? 'block' : 'none';
    }
    
    function playBeat() {
      if (pattern.length === 0) {
        alert('Tap some pads or use voice first!');
        return;
      }
      
      initAudio();
      isPlaying = true;
      currentBeat = 0;
      
      beatInterval = setInterval(() => {
        if (currentBeat < pattern.length) {
          playSound(pattern[currentBeat]);
          currentBeat++;
        } else {
          currentBeat = 0;
        }
      }, 400);
    }
    
    function stopBeat() {
      isPlaying = false;
      clearInterval(beatInterval);
    }
    
    function clearPattern() {
      stopBeat();
      pattern = [];
      currentBeat = 0;
      updateDisplay();
    }
    
    // Voice detection functions
    async function toggleVoice() {
      if (voiceListening) {
        stopVoice();
      } else {
        await startVoice();
      }
    }
    
    async function startVoice() {
      try {
        initAudio();
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        const source = audioCtx.createMediaStreamSource(mediaStream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        
        voiceListening = true;
        document.getElementById('voiceBtn').classList.add('recording');
        document.getElementById('voiceStatus').style.display = 'block';
        
        detectVolume();
      } catch(e) {
        alert('Could not access microphone: ' + e.message);
      }
    }
    
    function stopVoice() {
      voiceListening = false;
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
      }
      document.getElementById('voiceBtn').classList.remove('recording');
      document.getElementById('voiceStatus').style.display = 'none';
    }
    
    function detectVolume() {
      if (!voiceListening) return;
      
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(dataArray);
      
      // Calculate average volume
      let sum = 0;
      for (let i = 0; i < dataArray.length; i++) {
        sum += dataArray[i];
      }
      const avg = sum / dataArray.length;
      
      // If loud enough and enough time passed, trigger a beat
      const now = Date.now();
      if (avg > 30 && now - lastTrigger > 200) {
        // Random drum sound based on volume
        const soundType = Math.floor(Math.random() * 4) + 1;
        playSound(soundType);
        lastTrigger = now;
      }
      
      requestAnimationFrame(detectVolume);
    }
  </script>
</body>
</html><!-- force deploy -->

<!DOCTYPE html>
<html>
<head>
  <title>FEVER</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
  </style>
</head>
<body>
<script>
// 🎮 FEVER - The game that HATES you
let gameState = "MENU"; // MENU, PLAY, PUZZLE, TALKING, ANGRY, WIN
let player = { x: 100, y: 300, size: 30, vy: 0, grounded: false };
let platforms = [];
let message = { text: "", timer: 0, size: 20 };
let deaths = 0;
let rage = 0;
let level = 1;
let genre = "platformer";
let talking = false;
let talkingText = "";

const rageMessages = [
  "I'M GETTING FEVER!!!",
  "YOU CAN'T BEAT ME!",
  "THIS IS MY GAME!",
  "STUPID PLAYER!",
  "WHY WON'T YOU DIE?!",
  "I'LL MAKE IT IMPOSSIBLE!",
  "NO MORE FAIR PLATFORMS!",
  "JUST GIVE UP ALREADY!",
  "😡😡😡😡😡😡",
  "FEEEEEEVERRRR!!!"
];

const fourthWall = [
  "you think you're good at games?",
  "my creator was sleep deprived",
  "this is honestly mid",
  "please leave a review",
  "i'm only level " + level + "??",
  "the ai wrote this code at 3am",
  "literally unplayable",
  "nerf this, buff that",
  "players when the game is hard:",
  "git gud doesn't work here"
];

function setup() {
  createCanvas(windowWidth, windowHeight);
  initLevel();
}

function initLevel() {
  gameState = "PLAY";
  player = { x: 100, y: height - 150, size: 30, vy: 0, grounded: false };
  platforms = [];
  
  // Floor
  platforms.push({x: 0, y: height - 50, w: 300, h: 50, type: "normal"});
  
  // Platforms get harder
  let baseX = 350;
  for (let i = 0; i < level + 3; i++) {
    let isTrap = random() < (0.1 + level * 0.05);
    let isFake = random() < 0.2;
    platforms.push({
      x: baseX + i * 120 + random(-30, 30),
      y: height - 100 - i * 80 + random(-20, 20),
      w: random(60, 120),
      h: 20,
      type: isTrap ? "trap" : (isFake ? "fake" : "normal"),
      moves: random() < 0.2
    });
  }
  
  // Goal
  platforms.push({
    x: width - 150,
    y: 100,
    w: 80,
    h: 20,
    type: "goal"
  });
  
  // Random genre shift?
  if (random() < 0.3) {
    setTimeout(shiftGenre, random(2000, 5000));
  }
}

function shiftGenre() {
  if (gameState !== "PLAY") return;
  
  let genres = ["platformer", "puzzle", "typing", "quiz", "boss"];
  genre = random(genres);
  
  if (genre === "typing") {
    showMessage("TYPE THIS: " + random(["SURRENDER", "YOU LOSE", "GIVE UP"]));
  } else if (genre === "quiz") {
    showMessage("QUIZ: HOW BAD ARE YOU?");
  } else if (genre === "boss") {
    showMessage("BOSS BATTLE! GOOD LUCK!");
  }
}

function draw() {
  // Dynamic background
  let bg = lerpColor(color(20, 20, 30), color(80, 20, 20), rage / 50);
  background(bg);
  
  if (gameState === "MENU") {
    drawMenu();
  } else if (gameState === "PLAY") {
    drawGame();
  } else if (gameState === "TALKING") {
    drawTalking();
  } else if (gameState === "WIN") {
    drawWin();
  }
}

function drawMenu() {
  textAlign(CENTER);
  textSize(60);
  
  // Fever title with effect
  let wobble = sin(frameCount * 0.1) * 5;
  push();
  translate(width/2 + wobble, height/3);
  fill(255, 50, 50);
  text("FEVER", 0, 0);
  pop();
  
  textSize(20);
  fill(150);
  text("a game that hates you", width/2, height/3 + 50);
  
  // Menu options
  if (frameCount % 60 < 30) {
    textSize(30);
    fill(255, 200, 0);
    text("Click to Suffer", width/2, height/2 + 50);
  }
  
  textSize(14);
  fill(100);
  text("fun guaranteed or your money back", width/2, height - 50);
}

function drawGame() {
  // Rage meter
  fill(255, 50, 50);
  rect(20, 20, 200, 20);
  fill(255, 200, 0);
  rect(20, 20, rage * 4, 20);
  textSize(14);
  fill(255);
  text("FEVER: " + Math.floor(rage * 2) + "%", 25, 35);
  
  textSize(14);
  fill(150);
  text("Level " + level + " | Deaths: " + deaths, width - 150, 30);
  
  // Show current genre
  fill(genre === "platformer" ? color(100, 255, 150) : color(255, 150, 100));
  text(genre.toUpperCase(), width/2, 30);
  
  // Platforms
  for (let p of platforms) {
    if (p.type === "goal") {
      fill(255, 215, 0);
    } else if (p.type === "trap") {
      fill(255, 50, 100);
    } else if (p.type === "fake") {
      fill(100, 255, 150); // LOOKS safe
    } else {
      fill(100, 200, 255);
    }
    rect(p.x, p.y, p.w, p.h, 5);
    
    // Moving platforms
    if (p.moves) {
      p.x += sin(frameCount * 0.05 + p.y) * 2;
    }
  }
  
  // Player
  push();
  translate(player.x, player.y);
  
  // Body
  if (rage > 30) {
    // ANGRY player
    fill(255, 100, 100);
    shake = random(-2, 2);
    translate(shake, shake);
  } else {
    fill(255, 200, 100);
  }
  ellipse(0, 0, player.size);
  
  // Eyes - change with rage
  fill(255);
  ellipse(-6, -5, 12);
  ellipse(6, -5, 12);
  
  fill(0);
  if (rage < 20) {
    ellipse(-6, -5, 5);
    ellipse(6, -5, 5);
  } else if (rage < 40) {
    // Suspicious
    rect(-10, -8, 8, 4);
    rect(2, -8, 8, 4);
  } else {
    // ANGRY
    line(-10, -8, -2, -2);
    line(10, -8, 2, -2);
  }
  pop();
  
  // Physics
  if (keyIsDown(LEFT_ARROW) || keyIsDown(65)) player.x -= 6;
  if (keyIsDown(RIGHT_ARROW) || keyIsDown(68)) player.x += 6;
  
  player.vy += 0.8;
  player.y += player.vy;
  player.grounded = false;
  
  // Platform collision
  for (let p of platforms) {
    if (player.x > p.x && player.x < p.x + p.w &&
        player.y + player.size/2 > p.y && player.y + player.size/2 < p.y + p.h + player.vy + 5 &&
        player.vy >= 0) {
      
      if (p.type === "trap") {
        die("💀 TRAP! 💀");
      } else if (p.type === "fake") {
        // Fake platform - falls through!
      } else if (p.type === "goal") {
        winLevel();
      } else {
        player.y = p.y - player.size/2;
        player.vy = 0;
        player.grounded = true;
      }
    }
  }
  
  // Jump
  if ((keyIsDown(32) || keyIsDown(UP_ARROW) || keyIsDown(87)) && player.grounded) {
    player.vy = -15;
    if (random() < 0.1) showMessage(random(["NOPE", "LMAO"]));
  }
  
  // Fall death
  if (player.y > height) {
    die("fell off lol");
  }
  
  // Message display
  if (message.timer > 0) {
    message.timer--;
    textAlign(CENTER);
    textSize(message.size);
    fill(255, 255, 0);
    text(message.text, width/2, 100);
  }
  
  // Random fourth wall breaks
  if (random() < 0.001 && frameCount > 300) {
    fourthWallBreak();
  }
}

function fourthWallBreak() {
  showMessage(random(fourthWall));
}

function drawTalking() {
  fill(255);
  textAlign(CENTER);
  textSize(24);
  text(talkingText, width/2, height/2);
  textSize(16);
  fill(150);
  text("Click to continue...", width/2, height/2 + 50);
}

function drawWin() {
  textAlign(CENTER);
  fill(255, 215, 0);
  textSize(60);
  text("LEVEL " + level, width/2, height/2 - 30);
  
  textSize(20);
  fill(255);
  text("you're not good, just lucky", width/2, height/2 + 30);
  
  textSize(16);
  fill(150);
  text("click to continue suffering", width/2, height/2 + 80);
}

function showMessage(msg) {
  message.text = msg;
  message.timer = 120;
  message.size = 24;
}

function die(reason) {
  deaths++;
  rage = min(rage + 5, 50);
  
  showMessage(random(rageMessages));
  
  // Angry message
  if (rage >= 30 && random() < 0.5) {
    setTimeout(() => showMessage(random(fourthWall)), 2000);
  }
  
  // Reset position
  player.x = 100;
  player.y = height - 150;
  player.vy = 0;
  
  // Make harder
  if (deaths % 3 === 0) {
    level++;
    initLevel();
  }
}

function winLevel() {
  level++;
  gameState = "WIN";
}

function keyPressed() {
  if (gameState === "MENU") {
    gameState = "PLAY";
    initLevel();
  }
}

function mousePressed() {
  if (gameState === "MENU") {
    gameState = "PLAY";
    initLevel();
  } else if (gameState === "WIN") {
    initLevel();
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  if (gameState === "PLAY") initLevel();
}
</script>
</body>
</html>

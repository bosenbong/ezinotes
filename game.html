<!DOCTYPE html>
<html>
<head>
  <title>AI Game Maker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: white;
    }
    .app { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { text-align: center; margin-bottom: 20px; }
    .header h1 {
      font-size: 36px;
      background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p { color: #888; margin-top: 5px; }
    
    .input-area {
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 16px;
      margin-bottom: 15px;
    }
    
    input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      background: #1e1e3f;
      color: white;
      margin-bottom: 10px;
    }
    
    button.make-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #ff6b6b, #feca57);
      border: none;
      border-radius: 10px;
      color: #1a1a2e;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    button.make-btn:disabled { opacity: 0.5; }
    
    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 15px;
    }
    .cat-btn {
      padding: 10px 15px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
    }
    .cat-btn:hover { background: #feca57; color: #1a1a2e; }
    
    .game-area {
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 15px;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .game-area iframe {
      width: 100%;
      height: 420px;
      border: none;
    }
    
    .placeholder {
      text-align: center;
      color: #555;
      padding: 50px;
    }
    .placeholder span { font-size: 60px; display: block; margin-bottom: 15px; }
    
    .controls {
      display: flex;
      gap: 10px;
    }
    .ctrl-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .new-btn { background: #ff6b6b; color: white; }
    .share-btn { background: #48dbfb; color: #1a1a2e; }
    .copy-btn { background: #1dd1a1; color: #1a1a2e; }
    
    .tip {
      margin-top: 15px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      font-size: 13px;
      color: #777;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>🎮 AI Game Maker</h1>
      <p>Type a game idea, play instantly!</p>
    </div>
    
    <div class="input-area">
      <input type="text" id="prompt" placeholder="Describe your game..." />
      <button class="make-btn" onclick="makeGame()" id="makeBtn">✨ Create & Play</button>
    </div>
    
    <div class="categories">
      <button class="cat-btn" onclick="fill('make a space shooter game')">🚀 Space</button>
      <button class="cat-btn" onclick="fill('make a jumping platformer')">🏃 Platformer</button>
      <button class="cat-btn" onclick="fill('make a snake game')">🐍 Snake</button>
      <button class="cat-btn" onclick="fill('make a racing game')">🏎️ Racing</button>
      <button class="cat-btn" onclick="fill('make flappy bird')">🐦 Flappy</button>
      <button class="cat-btn" onclick="fill('make a boss battle game')">👹 Boss</button>
    </div>
    
    <div class="game-area" id="gameArea">
      <div class="placeholder">
        <span>🎮</span>
        Your game will appear here!<br/>
        Click a category or type your idea above.
      </div>
    </div>
    
    <div class="controls" id="controls" style="display:none;">
      <button class="ctrl-btn new-btn" onclick="newGame()">🔄 New Game</button>
      <button class="ctrl-btn copy-btn" onclick="copyCode()">📋 Copy Code</button>
      <button class="ctrl-btn share-btn" onclick="shareGame()">🔗 Share</button>
    </div>
    
    <div class="tip">
      💡 Tip: Games run in p5.js editor. Use arrow keys, mouse, or spacebar!
    </div>
  </div>

  <script>
    let currentCode = '';
    let gameId = Date.now();
    
    function fill(text) {
      document.getElementById('prompt').value = text;
    }
    
    async function makeGame() {
      const prompt = document.getElementById('prompt').value;
      const btn = document.getElementById('makeBtn');
      const area = document.getElementById('gameArea');
      
      if (!prompt.trim()) {
        alert('Type a game idea first!');
        return;
      }
      
      btn.textContent = '🤔 Creating...';
      btn.disabled = true;
      area.innerHTML = '<div class="placeholder"><span>⚡</span>Generating your game...</div>';
      
      try {
        const response = await fetch('https://ezinotes.vercel.app/api/makergame', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ prompt })
        });
        
        const data = await response.json();
        
        if (data.gameCode) {
          let code = data.gameCode;
          code = code.replace(/```javascript\n/g, '');
          code = code.replace(/```\n/g, '');
          code = code.replace(/```js\n/g, '');
          code = code.replace(/```/g, '');
          
          // Add createCanvas if missing
          if (!code.includes('createCanvas')) {
            code = code.replace('function setup()', 'function setup() { createCanvas(500, 400);');
          }
          
          currentCode = code;
          
          // Create p5.js embed
          const embedUrl = createP5Embed(code);
          area.innerHTML = `<iframe src="${embedUrl}" allow="clipboard-write"></iframe>`;
          document.getElementById('controls').style.display = 'flex';
          
        } else {
          area.innerHTML = '<div class="placeholder"><span>❌</span>Error: ' + (data.error || 'Try again') + '</div>';
        }
      } catch(e) {
        area.innerHTML = '<div class="placeholder"><span>❌</span>Error: ' + e.message + '</div>';
      }
      
      btn.textContent = '✨ Create & Play';
      btn.disabled = false;
    }
    
    function createP5Embed(code) {
      // Create a shareable p5 editor link
      const encoded = encodeURIComponent(code);
      return `https://editor.p5js.org/new/sketch?code=${encoded.substring(0, 5000)}`;
    }
    
    function newGame() {
      document.getElementById('gameArea').innerHTML = '<div class="placeholder"><span>🎮</span>Your game will appear here!</div>';
      document.getElementById('controls').style.display = 'none';
      document.getElementById('prompt').value = '';
      currentCode = '';
    }
    
    function copyCode() {
      if (currentCode) {
        navigator.clipboard.writeText(currentCode);
        window.open('https://editor.p5js.org', '_blank');
        setTimeout(() => alert('Code copied! Paste it into p5.js editor to play.'), 100);
      }
    }
    
    function shareGame() {
      if (!currentCode) return;
      const encoded = btoa(unescape(encodeURIComponent(currentCode)));
      const url = 'https://ezinotes.vercel.app/game.html?code=' + encoded;
      navigator.clipboard.writeText(url);
      alert('Share link copied!');
    }
    
    // Check for shared code
    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      const sharedCode = params.get('code');
      if (sharedCode) {
        try {
          currentCode = decodeURIComponent(escape(atob(sharedCode)));
          document.getElementById('prompt').value = 'Shared game!';
          const embedUrl = createP5Embed(currentCode);
          document.getElementById('gameArea').innerHTML = `<iframe src="${embedUrl}" allow="clipboard-write"></iframe>`;
          document.getElementById('controls').style.display = 'flex';
        } catch(e) {}
      }
    };
  </script>
</body>
</html>

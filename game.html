<!DOCTYPE html>
<html>
<head>
  <title>AI Game Maker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      min-height: 100vh;
      padding: 20px;
      color: white;
    }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 10px; }
    p { text-align: center; color: #888; margin-bottom: 30px; }
    
    .input-area {
      background: #0f0f23;
      padding: 20px;
      border-radius: 16px;
      display: flex;
      gap: 10px;
    }
    
    input {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      background: #1e1e3f;
      color: white;
    }
    
    button {
      padding: 15px 25px;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    
    button:disabled { opacity: 0.5; }
    
    #output {
      margin-top: 30px;
      background: #0f0f23;
      border-radius: 16px;
      padding: 20px;
      min-height: 300px;
    }
    
    #output h3 { margin-bottom: 15px; color: #f093fb; }
    #output pre {
      background: #1e1e3f;
      padding: 15px;
      border-radius: 10px;
      overflow-x: auto;
      white-space: pre-wrap;
      font-size: 12px;
    }
    
    #playBtn {
      display: none;
      margin-top: 15px;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }
    
    .examples {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    
    .example-btn {
      padding: 8px 15px;
      background: #1e1e3f;
      border: 1px solid #333;
      border-radius: 20px;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 AI Game Maker</h1>
    <p>Tell AI what game to make, and it writes the code!</p>
    
    <div class="input-area">
      <input type="text" id="prompt" placeholder="e.g., make a jumping game where you avoid obstacles" />
      <button onclick="makeGame()" id="makeBtn">Make My Game!</button>
    </div>
    
    <div class="examples">
      <button class="example-btn" onclick="fillPrompt('make a game where you catch falling stars')">⭐ Catch Stars</button>
      <button class="example-btn" onclick="fillPrompt('make a racing game with obstacles to avoid')">🏎️ Racing</button>
      <button class="example-btn" onclick="fillPrompt('make a snake game')">🐍 Snake</button>
      <button class="example-btn" onclick="fillPrompt('make a space shooter game')">🚀 Space Shooter</button>
    </div>
    
    <div id="output">
      <h3>Your Game Code:</h3>
      <pre id="code">// Your game code will appear here after AI generates it!</pre>
      <button id="playBtn" onclick="copyCode()">📋 Copy Code</button>
    </div>
  </div>

  <script>
    function fillPrompt(text) {
      document.getElementById('prompt').value = text;
    }

    async function makeGame() {
      const prompt = document.getElementById('prompt').value;
      const btn = document.getElementById('makeBtn');
      const codeEl = document.getElementById('code');
      const playBtn = document.getElementById('playBtn');
      
      if (!prompt.trim()) {
        alert('Please type a game idea first!');
        return;
      }
      
      btn.textContent = '🤔 AI is thinking...';
      btn.disabled = true;
      codeEl.textContent = 'Generating your game...';
      
      try {
        const response = await fetch('https://ezinotes.vercel.app/api/makergame', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ prompt })
        });
        
        const data = await response.json();
        
        if (data.gameCode) {
          codeEl.textContent = data.gameCode;
          playBtn.style.display = 'inline-block';
        } else {
          codeEl.textContent = 'Error: ' + (data.error || 'Something went wrong');
        }
      } catch(e) {
        codeEl.textContent = 'Error: ' + e.message;
      }
      
      btn.textContent = 'Make My Game!';
      btn.disabled = false;
    }

    function copyCode() {
      const code = document.getElementById('code').textContent;
      navigator.clipboard.writeText(code);
      alert('Code copied! Now paste it into p5.js editor to play!');
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>AI Game Maker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: white;
    }
    .app { max-width: 500px; margin: 0 auto; padding: 20px; }
    .header { text-align: center; margin-bottom: 25px; }
    .header h1 {
      font-size: 36px;
      background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p { color: #888; }
    
    .input-area {
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 14px;
      margin-bottom: 15px;
    }
    
    input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      background: #1e1e3f;
      color: white;
      margin-bottom: 10px;
    }
    
    button.make-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #ff6b6b, #feca57);
      border: none;
      border-radius: 10px;
      color: #1a1a2e;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    button.make-btn:disabled { opacity: 0.5; }
    
    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .cat-btn {
      padding: 10px 15px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
    }
    .cat-btn:hover { background: #feca57; color: #1a1a2e; }
    
    .result {
      background: #000;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .result .icon { font-size: 50px; margin-bottom: 15px; }
    .result h3 { color: #feca57; margin-bottom: 15px; }
    .result p { color: #777; margin-bottom: 20px; }
    
    .btn-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }
    .btn-row button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .play-btn { background: #1dd1a1; color: #1a1a2e; }
    .copy-btn { background: #48dbfb; color: #1a1a2e; }
    .share-btn { background: #a55eea; color: white; }
    
    .tip {
      margin-top: 15px;
      text-align: center;
      color: #555;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>🎮 AI Game Maker</h1>
      <p>Type an idea, get a playable game!</p>
    </div>
    
    <div class="input-area">
      <input type="text" id="prompt" placeholder="Describe your game..." />
      <button class="make-btn" onclick="makeGame()" id="makeBtn">✨ Create Game</button>
    </div>
    
    <div class="categories">
      <button class="cat-btn" onclick="fill('make a space shooter game')">🚀 Space</button>
      <button class="cat-btn" onclick="fill('make a jumping platformer')">🏃 Platformer</button>
      <button class="cat-btn" onclick="fill('make a snake game')">🐍 Snake</button>
      <button class="cat-btn" onclick="fill('make a racing game')">🏎️ Racing</button>
      <button class="cat-btn" onclick="fill('make flappy bird game')">🐦 Flappy</button>
      <button class="cat-btn" onclick="fill('make a boss battle')">👹 Boss</button>
    </div>
    
    <div class="result" id="result">
      <div class="icon">🎮</div>
      <h3>Ready to Create!</h3>
      <p>Pick a category or type your idea above</p>
    </div>
    
    <div class="tip">
      Games open in p5.js editor - free and easy to use!
    </div>
  </div>

  <script>
    let currentCode = '';
    
    function fill(text) {
      document.getElementById('prompt').value = text;
    }
    
    async function makeGame() {
      const prompt = document.getElementById('prompt').value;
      const btn = document.getElementById('makeBtn');
      const result = document.getElementById('result');
      
      if (!prompt.trim()) {
        alert('Type a game idea first!');
        return;
      }
      
      btn.textContent = '🤔 Creating...';
      btn.disabled = true;
      result.innerHTML = '<div class="icon">⚡</div><h3>Generating...</h3><p>Please wait...</p>';
      
      try {
        const response = await fetch('https://ezinotes.vercel.app/api/makergame', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ prompt })
        });
        
        const data = await response.json();
        
        if (data.gameCode) {
          let code = data.gameCode;
          // Clean up code blocks
          code = code.replace(/```javascript\n/g, '');
          code = code.replace(/```\n/g, '');
          code = code.replace(/```js\n/g, '');
          code = code.replace(/```/g, '');
          
          // Add createCanvas if missing
          if (!code.includes('createCanvas')) {
            code = code.replace('function setup()', 'function setup() { createCanvas(400, 400);');
          }
          
          currentCode = code;
          
          // Show result
          result.innerHTML = `
            <div class="icon">🎉</div>
            <h3>Game Created!</h3>
            <p>Your game is ready to play</p>
            <div class="btn-row">
              <button class="play-btn" onclick="playGame()">▶ Play Now</button>
              <button class="copy-btn" onclick="copyCode()">📋 Copy</button>
              <button class="share-btn" onclick="shareGame()">🔗 Share</button>
            </div>
          `;
          
        } else {
          result.innerHTML = `<div class="icon">❌</div><h3>Error</h3><p>${data.error || 'Try again'}</p>`;
        }
      } catch(e) {
        result.innerHTML = `<div class="icon">❌</div><h3>Error</h3><p>${e.message}</p>`;
      }
      
      btn.textContent = '✨ Create Game';
      btn.disabled = false;
    }
    
    function playGame() {
      // Copy to clipboard and open p5.js
      navigator.clipboard.writeText(currentCode);
      window.open('https://editor.p5js.org', '_blank');
      alert('Code copied! Paste it into the p5.js editor and press Play!');
    }
    
    function copyCode() {
      navigator.clipboard.writeText(currentCode);
      alert('Code copied to clipboard!');
    }
    
    function shareGame() {
      if (!currentCode) return;
      const encoded = btoa(unescape(encodeURIComponent(currentCode)));
      const url = 'https://ezinotes.vercel.app/game.html?code=' + encoded;
      navigator.clipboard.writeText(url);
      alert('Share link copied!');
    }
    
    // Check for shared code
    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      const sharedCode = params.get('code');
      if (sharedCode) {
        try {
          currentCode = decodeURIComponent(escape(atob(sharedCode)));
          document.getElementById('prompt').value = 'Shared game!';
          document.getElementById('result').innerHTML = `
            <div class="icon">🎁</div>
            <h3>Shared Game!</h3>
            <p>Click Play to start</p>
            <div class="btn-row">
              <button class="play-btn" onclick="playGame()">▶ Play Now</button>
              <button class="share-btn" onclick="shareGame()">🔗 Share</button>
            </div>
          `;
        } catch(e) {}
      }
    };
  </script>
</body>
</html>

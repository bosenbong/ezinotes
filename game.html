<!DOCTYPE html>
<html>
<head>
  <title>AI Game Maker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: white;
    }
    .app {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 36px;
      background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 2s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }
    .header p { color: #888; margin-top: 5px; }
    
    .category-section {
      margin-bottom: 20px;
    }
    .category-title {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .cat-btn {
      padding: 10px 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-btn:hover, .cat-btn.active {
      background: linear-gradient(90deg, #ff6b6b, #feca57);
      color: #1a1a2e;
      border: none;
    }
    
    .input-area {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    
    input {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      background: #1e1e3f;
      color: white;
      margin-bottom: 12px;
    }
    
    button.make-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(90deg, #ff6b6b, #feca57);
      border: none;
      border-radius: 14px;
      color: #1a1a2e;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button.make-btn:hover { transform: scale(1.02); }
    button.make-btn:disabled { opacity: 0.5; }
    
    .output {
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      padding: 20px;
      min-height: 300px;
    }
    .output h3 {
      color: #feca57;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    pre {
      background: #1a1a2e;
      padding: 15px;
      border-radius: 12px;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    .action-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .copy-btn {
      background: #48dbfb;
      color: #1a1a2e;
    }
    .play-btn {
      background: #1dd1a1;
      color: #1a1a2e;
    }
    .share-btn {
      background: #a55eea;
      color: white;
    }
    .action-btn:hover { transform: scale(1.02); }
    
    .footer {
      text-align: center;
      margin-top: 30px;
      color: #555;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>🎮 AI Game Maker</h1>
      <p>Type an idea, get a playable game!</p>
    </div>
    
    <div class="category-section">
      <div class="category-title">🎮 Game Types</div>
      <div class="categories">
        <button class="cat-btn" onclick="fillPrompt('make a jumping game with platforms and powerups')">🏃 Platformer</button>
        <button class="cat-btn" onclick="fillPrompt('make a space shooter with enemies and upgrades')">🚀 Space Shooter</button>
        <button class="cat-btn" onclick="fillPrompt('make a snake game that grows when eating')">🐍 Snake</button>
        <button class="cat-btn" onclick="fillPrompt('make a racing game with boost pads')">🏎️ Racing</button>
        <button class="cat-btn" onclick="fillPrompt('make a puzzle game matching colors')">🧩 Puzzle</button>
        <button class="cat-btn" onclick="fillPrompt('make an endless runner with obstacles')">🏃 Runner</button>
        <button class="cat-btn" onclick="fillPrompt('make a tennis game with physics')">🎾 Sports</button>
        <button class="cat-btn" onclick="fillPrompt('make a flappy bird clone with characters')">🐦 Flappy</button>
      </div>
    </div>
    
    <div class="category-section">
      <div class="category-title">⚡ Difficulty</div>
      <div class="categories">
        <button class="cat-btn" onclick="setDifficulty('easy')">😊 Easy</button>
        <button class="cat-btn" onclick="setDifficulty('medium')">🤔 Medium</button>
        <button class="cat-btn" onclick="setDifficulty('hard')">😈 Hard</button>
        <button class="cat-btn" onclick="setDifficulty('insane')">💀 Insane</button>
      </div>
    </div>
    
    <div class="category-section">
      <div class="category-title">✨ Special</div>
      <div class="categories">
        <button class="cat-btn" onclick="fillPrompt('make a game with 2 player local multiplayer')">👥 2 Player</button>
        <button class="cat-btn" onclick="fillPrompt('make a game with cool particle effects and neon graphics')">💫 Neon</button>
        <button class="cat-btn" onclick="fillPrompt('make a game with boss battles')">👹 Boss Fight</button>
        <button class="cat-btn" onclick="fillPrompt('make a game with powerups and upgrades')">⭐ RPG Style</button>
      </div>
    </div>
    
    <div class="input-area">
      <input type="text" id="prompt" placeholder="Describe your game idea..." />
      <button class="make-btn" onclick="makeGame()" id="makeBtn">✨ Make My Game!</button>
    </div>
    
    <div class="output">
      <h3>📦 Your Game Code</h3>
      <pre id="code">// Your game code will appear here!
// Click "Make My Game" to generate...</pre>
      <div class="actions">
        <button class="action-btn copy-btn" onclick="copyCode()">📋 Copy</button>
        <button class="action-btn play-btn" onclick="goToEditor()">▶ Play</button>
        <button class="action-btn share-btn" onclick="shareGame()" style="background:#a55eea;color:white;">🔗 Share</button>
      </div>
      <div id="shareLink" style="display:none;margin-top:15px;padding:12px;background:#222;border-radius:10px;font-size:13px;">
        <span style="color:#48dbfb;">Share this link:</span>
        <input type="text" id="shareInput" readonly style="width:100%;margin-top:8px;padding:10px;background:#333;border:none;border-radius:8px;color:#aaa;font-size:12px;" />
    </div>
    
    <div class="footer">
      Made by Henry 🚀 | Powered by AI
    </div>
  </div>

  <script>
    let lastCode = '';
    
    function fillPrompt(text) {
      document.getElementById('prompt').value = text;
    }
    
    function setDifficulty(level) {
      const difficulties = {
        easy: 'make an easy fun game with simple controls',
        medium: 'make a moderate challenge game',
        hard: 'make a challenging game with fast enemies',
        insane: 'make an extremely hard game for experts only'
      };
      document.getElementById('prompt').value = difficulties[level];
    }

    async function makeGame() {
      const prompt = document.getElementById('prompt').value;
      const btn = document.getElementById('makeBtn');
      const codeEl = document.getElementById('code');
      
      if (!prompt.trim()) {
        alert('Please type a game idea first!');
        return;
      }
      
      btn.textContent = '🤔 AI is creating your game...';
      btn.disabled = true;
      codeEl.textContent = 'Generating...';
      
      try {
        const response = await fetch('https://ezinotes.vercel.app/api/makergame', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ prompt })
        });
        
        const data = await response.json();
        
        if (data.gameCode) {
          // Clean up the code
          let code = data.gameCode;
          // Remove markdown code blocks if present
          code = code.replace(/```javascript\n/g, '');
          code = code.replace(/```\n/g, '');
          code = code.replace(/```js\n/g, '');
          code = code.replace(/```/g, '');
          
          lastCode = code;
          codeEl.textContent = code;
        } else {
          codeEl.textContent = 'Error: ' + (data.error || 'Something went wrong');
        }
      } catch(e) {
        codeEl.textContent = 'Error: ' + e.message;
      }
      
      btn.textContent = '✨ Make My Game!';
      btn.disabled = false;
    }

    function copyCode() {
      navigator.clipboard.writeText(lastCode);
      alert('Code copied! Paste it into p5.js editor to play.');
    }
    
    function goToEditor() {
      if (lastCode) {
        navigator.clipboard.writeText(lastCode);
        window.open('https://editor.p5js.org', '_blank');
        alert('Code copied! Paste it into the p5.js editor.');
      }
    }
    
    function shareGame() {
      if (!lastCode) {
        alert('Make a game first!');
        return;
      }
      // Encode code to base64 for sharing
      const encoded = btoa(unescape(encodeURIComponent(lastCode)));
      const shareUrl = 'https://ezinotes.vercel.app/game.html?code=' + encoded;
      
      document.getElementById('shareLink').style.display = 'block';
      document.getElementById('shareInput').value = shareUrl;
      document.getElementById('shareInput').select();
      navigator.clipboard.writeText(shareUrl);
      alert('Share link copied to clipboard!');
    }
    
    // Check for shared code in URL
    window.onload = function() {
      const params = new URLSearchParams(window.location.search);
      const sharedCode = params.get('code');
      if (sharedCode) {
        try {
          lastCode = decodeURIComponent(escape(atob(sharedCode)));
          document.getElementById('code').textContent = lastCode;
          document.getElementById('prompt').value = 'Shared game from friend!';
        } catch(e) {
          console.log('Could not load shared code');
        }
      }
    };
  </script>
</body>
</html>

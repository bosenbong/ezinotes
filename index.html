<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EziNotes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      min-height: 100vh;
      padding: 20px;
    }
    .app {
      max-width: 400px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
    }
    .header {
      background: #2563eb;
      color: white;
      padding: 24px;
      text-align: center;
    }
    .header h1 { font-size: 24px; }
    .content { padding: 24px; text-align: center; }
    .record-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 48px;
      cursor: pointer;
    }
    .record-btn.recording { background: #ef4444; }
    .status { margin-top: 12px; color: #666; }
    .note-box {
      background: #f3f4f6;
      border-radius: 12px;
      padding: 16px;
      margin-top: 24px;
      min-height: 100px;
      white-space: pre-wrap;
      font-size: 14px;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>📝 EziNotes</h1>
      <p>Voice to NDIS notes</p>
    </div>
    <div class="content">
      <button id="recordBtn" class="record-btn">🎤</button>
      <p id="status" class="status">Tap mic to start</p>
      <div id="noteBox" class="note-box">Your note will appear here...</div>
      <div id="toast" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:white;padding:12px 24px;border-radius:8px;">Test</div>
    </div>
  </div>
  <script>
    const recordBtn = document.getElementById('recordBtn');
    const statusEl = document.getElementById('status');
    const noteBox = document.getElementById('noteBox');
    const toast = document.getElementById('toast');
    let isRecording = false;
    let recognition = null;
    let timer = null;
    let seconds = 0;
    let fullTranscript = '';

    function show(msg) {
      toast.textContent = msg;
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3000);
    }

    function fmtTime(s) {
      return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
    }

    function fmtNote(text) {
      if (!text) return '';
      const now = new Date();
      const date = now.toLocaleDateString('en-AU', {day:'numeric', month:'long', year:'numeric'});
      return 'Client: [Name]\\nDate/Time: 11:00am – 2:00pm\\nService Type: Social & Domestic Support / Transport\\n\\nACTIVITIES UNDERTAKEN:\\n' + text + '\\n\\nWELLBEING/OUTCOME:\\n- Client remained happy, healthy, and engaged.\\n- All tasks completed.\\n\\nDEPARTURE:\\nLeft at 2:00pm on time.';
    }

    recordBtn.onclick = () => {
      if (isRecording) {
        if (recognition) recognition.stop();
        isRecording = false;
        recordBtn.textContent = '🎤';
        recordBtn.classList.remove('recording');
        clearInterval(timer);
        statusEl.textContent = 'Done! Check your note';
        show('Recording stopped');
      } else {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
          statusEl.textContent = 'Speech not supported - try Chrome';
          show('Not supported');
          return;
        }
        recognition = new SR();
        recognition.continuous = true;
        recognition.interimResults = true;
        
        recognition.onstart = () => {
          isRecording = true;
          fullTranscript = '';
          seconds = 0;
          recordBtn.textContent = '⏹';
          recordBtn.classList.add('recording');
          statusEl.textContent = 'Recording... speak now';
          show('Recording...');
          timer = setInterval(() => {
            seconds++;
            statusEl.textContent = 'Recording: ' + fmtTime(seconds);
          }, 1000);
        };
        
        recognition.onresult = (e) => {
          let final = '', interim = '';
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const t = e.results[i][0].transcript.trim();
            if (!t) continue;
            if (e.results[i].isFinal) {
              // Deduplicate - only add if not already at end of transcript
              const cleanT = t.toLowerCase();
              const existingEnd = fullTranscript.trim().toLowerCase();
              if (!existingEnd.endsWith(cleanT) && !existingEnd.includes(cleanT + ' ' + cleanT)) {
                final += t + ' ';
              }
            } else {
              interim += t;
            }
          }
          if (final) fullTranscript += final;
          if (interim) statusEl.textContent = 'Listening: ' + interim.substring(0,30) + '...';
        };
        
        recognition.onerror = (e) => {
          statusEl.textContent = 'Error: ' + e.error;
          show(e.error);
        };
        
        recognition.onend = () => {
          // Only process if we intentionally stopped
          if (!isRecording) {
            clearInterval(timer);
            return;
          }
          // If still marked as recording but recognition ended unexpectedly, try to restart once
          try {
            recognition.start();
          } catch(e) {
            // Failed to restart - stop recording cleanly
            isRecording = false;
            clearInterval(timer);
            if (fullTranscript) {
              const formatted = fmtNote(fullTranscript);
              noteBox.textContent = formatted;
              statusEl.textContent = 'Note ready!';
              show('Done!');
              addPolishButton();
            } else {
              statusEl.textContent = 'No speech detected';
              show('Try again');
            }
            recordBtn.textContent = '🎤';
            recordBtn.classList.remove('recording');
          }
        };
        
        function addPolishButton() {
          const existing = document.getElementById('polishBtn');
          if (existing) return;
          
          const btn = document.createElement('button');
          btn.id = 'polishBtn';
          btn.textContent = '✨ Polish Note (AI)';
          btn.style.cssText = 'margin-top:12px;padding:12px 20px;background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;width:100%;';
          btn.onclick = async () => {
            const originalText = btn.textContent;
            btn.textContent = '⏳ Polishing...';
            btn.disabled = true;
            try {
              const res = await fetch('/api/polish', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ transcript: fullTranscript })
              });
              const data = await res.json();
              if (data.polishedNote) {
                noteBox.textContent = data.polishedNote;
                show('Note polished!');
              } else {
                show('Error: ' + (data.error || 'Failed'));
              }
            } catch(e) {
              show('Error: ' + e.message);
            }
            btn.textContent = originalText;
            btn.disabled = false;
          };
          noteBox.parentNode.insertBefore(btn, noteBox.nextSibling);
          
          // Add Copy and Save buttons
          const btnRow = document.createElement('div');
          btnRow.style.cssText = 'display:flex;gap:12px;margin-top:12px;';
          
          const copyBtn = document.createElement('button');
          copyBtn.textContent = '📋 Copy';
          copyBtn.style.cssText = 'flex:1;padding:12px;background:#3b82f6;color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;';
          copyBtn.onclick = () => {
            navigator.clipboard.writeText(noteBox.textContent);
            show('Copied!');
          };
          
          const saveBtn = document.createElement('button');
          saveBtn.textContent = '💾 Save';
          saveBtn.style.cssText = 'flex:1;padding:12px;background:#10b981;color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;';
          saveBtn.onclick = () => {
            const blob = new Blob([noteBox.textContent], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'note-' + new Date().toISOString().split('T')[0] + '.txt';
            a.click();
            URL.revokeObjectURL(url);
            show('Saved!');
          };
          
          btnRow.appendChild(copyBtn);
          btnRow.appendChild(saveBtn);
          noteBox.parentNode.insertBefore(btnRow, btnRow.nextSibling);
        }
        
        try {
          recognition.start();
        } catch(e) {
          statusEl.textContent = 'Error: ' + e.message;
        }
      }
    };
  </script>
  </script>
</body>
</html>

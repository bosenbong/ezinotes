<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EziNotes - Voice to NDIS Notes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      min-height: 100vh;
      padding: 20px;
    }
    .app {
      max-width: 400px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
    }
    .header {
      background: #2563eb;
      color: white;
      padding: 24px;
      text-align: center;
    }
    .header h1 { font-size: 24px; margin: 0; }
    .content { padding: 24px; text-align: center; }
    .record-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 48px;
      cursor: pointer;
    }
    .record-btn.recording { background: #ef4444; }
    .timer { font-size: 32px; font-weight: bold; margin: 10px 0; }
    .status { margin-top: 12px; color: #666; }
    .note-box {
      background: #f3f4f6;
      border-radius: 12px;
      padding: 16px;
      margin-top: 24px;
      min-height: 100px;
      white-space: pre-wrap;
      font-size: 14px;
      text-align: left;
    }
    .btn-row { display: flex; gap: 10px; margin-top: 12px; }
    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      opacity: 1;
    }
    .btn:hover { opacity: 0.85; transform: scale(1.02); }
    .btn:active { transform: scale(0.98); }
    .btn-polish { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .btn-copy { background: #3b82f6; color: white; }
    .btn-save { background: #8b5cf6; color: white; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>📝 EziNotes</h1>
      <p>Voice to NDIS notes</p>
    </div>
    <div style="background:#fff3cd;padding:10px;font-size:12px;text-align:center;border-bottom:1px solid #ffeeba;">
      ⚠️ <strong>Beta Test:</strong> Use initials only (e.g., S.G.). Don't enter real client names. 
    </div>
    <div class="content">
      <button id="recordBtn" onclick="handleRecordClick()" class="record-btn">🎤</button>
      <div id="timer" class="timer">0:00</div>
      <p id="status" class="status">Tap mic to start</p>
      <div id="noteBox" class="note-box">Your note will appear here...</div>
      <div id="btnRow" class="btn-row" style="display:none;">
        <button class="btn btn-polish" onclick="polishNote()">✨ Polish (AI)</button>
      </div>
      <div id="btnRow2" class="btn-row" style="display:none;">
        <button class="btn btn-copy" onclick="copyNote()">📋 Copy</button>
        <button class="btn btn-save" onclick="saveNote()">💾 Save</button>
      </div>
      
      <button class="btn" style="background:#636e72;margin-top:20px;" onclick="showFeedback()">💬 Send Feedback</button>
      
      <div id="feedbackSection" style="display:none;margin-top:15px;background:#f3f4f6;padding:15px;border-radius:10px;">
        <p style="font-weight:bold;margin-bottom:10px;">Help us improve! What's wrong or what do you need?</p>
        <p style="font-size:12px;color:#666;margin-bottom:10px;">⚠️ Please don't include real client names in your feedback.</p>
        <textarea id="feedbackText" placeholder="Type your feedback here..." style="width:100%;height:80px;padding:10px;border-radius:8px;border:1px solid #ddd;margin-bottom:10px;"></textarea>
        <button class="btn" onclick="sendFeedback()">📤 Send</button>
      </div>
    </div>
  </div>

  <script>
    const recordBtn = document.getElementById('recordBtn');
    const statusEl = document.getElementById('status');
    const noteBox = document.getElementById('noteBox');
    const timerEl = document.getElementById('timer');
    const btnRow = document.getElementById('btnRow');
    const btnRow2 = document.getElementById('btnRow2');
    
    let isRecording = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let timer = null;
    let seconds = 0;
    let fullTranscript = '';

    function fmtTime(s) {
      return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
    }

    recordBtn.onclick = function() {
      handleRecordClick();
    };

    function handleRecordClick() {
      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    };

    async function startRecording() {
      console.log('Starting recording...');
      try {
        statusEl.textContent = 'Starting...';
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // Check supported MIME type
        let mimeType = 'audio/webm';
        if (!MediaRecorder.isTypeSupported('audio/webm')) {
          mimeType = 'audio/mp4';
          if (!MediaRecorder.isTypeSupported('audio/mp4')) {
            mimeType = 'audio/ogg';
          }
        }
        
        mediaRecorder = new MediaRecorder(stream, { mimeType });
        audioChunks = [];
        
        mediaRecorder.ondataavailable = function(event) {
          if (event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };
        
        mediaRecorder.onstop = async function() {
          stream.getTracks().forEach(track => track.stop());
          
          if (audioChunks.length > 0) {
            statusEl.textContent = 'Transcribing...';
            const audioBlob = new Blob(audioChunks, { type: mimeType });
            await transcribeAudio(audioBlob);
          }
        };
        
        mediaRecorder.start(100);
        isRecording = true;
        fullTranscript = '';
        seconds = 0;
        recordBtn.textContent = '⏹';
        recordBtn.classList.add('recording');
        statusEl.textContent = 'Recording... speak now';
        
        timer = setInterval(function() {
          seconds++;
          timerEl.textContent = fmtTime(seconds);
        }, 1000);
        
      } catch(e) {
        statusEl.textContent = 'Error: ' + e.message;
        alert('Error: ' + e.message + '. Please allow microphone access.');
      }
    }

    async function stopRecording() {
      isRecording = false;
      clearInterval(timer);
      
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      
      recordBtn.textContent = '🎤';
      recordBtn.classList.remove('recording');
    }

    async function transcribeAudio(audioBlob) {
      try {
        const formData = new FormData();
        formData.append('audio', audioBlob, 'recording.webm');
        
        const response = await fetch('/api/transcribe', {
          method: 'POST',
          body: formData
        });
        
        const data = await response.json();
        
        if (data.transcript) {
          fullTranscript = data.transcript;
          noteBox.textContent = formatNote(fullTranscript);
          statusEl.textContent = 'Done! Tap mic to record again';
          btnRow.style.display = 'flex';
          btnRow2.style.display = 'flex';
        } else if (data.error) {
          statusEl.textContent = 'Error: ' + data.error;
          alert('Transcription failed: ' + data.error);
        }
      } catch(e) {
        statusEl.textContent = 'Error: ' + e.message;
        alert('Transcription error: ' + e.message);
      }
    }

    function formatNote(text) {
      // Remove duplicate words
      let words = text.toLowerCase().split(/\s+/);
      let deduped = [];
      for (let j = 0; j < words.length; j++) {
        if (j >= 1 && words[j] === words[j-1]) continue;
        if (j >= 2 && words[j] === words[j-2]) continue;
        deduped.push(words[j]);
      }
      text = deduped.join(' ');
      text = text.trim();
      text = text.charAt(0).toUpperCase() + text.slice(1);
      if (!text.match(/[.!?]$/)) text += '.';
      
      const now = new Date();
      const date = now.toLocaleDateString('en-AU', {day:'numeric', month:'long', year:'numeric'});
      return 'Client: [Name]\nDate/Time: 11:00am – 2:00pm\nService Type: Social & Domestic Support / Transport\n\nACTIVITIES UNDERTAKEN:\n' + text + '\n\nWELLBEING/OUTCOME:\n- Client remained happy, healthy, and engaged.\n- All tasks completed.\n\nDEPARTURE:\nLeft at 2:00pm on time.';
    }
      }
    }

    function stopRecording() {
      isRecording = false;
      if (recognition) recognition.stop();
      clearInterval(timer);
      
      recordBtn.textContent = '🎤';
      recordBtn.classList.remove('recording');
      
      if (fullTranscript) {
        noteBox.textContent = formatNote(fullTranscript);
        statusEl.textContent = 'Done! Tap mic to record again';
        btnRow.style.display = 'flex';
        btnRow2.style.display = 'flex';
      } else {
        statusEl.textContent = 'No speech detected - try again';
      }
    }

    function polishNote() {
      statusEl.textContent = 'Polishing with AI...';
      fetch('/api/polish', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ transcript: fullTranscript })
      })
      .then(res => res.json())
      .then(data => {
        if (data.polishedNote) {
          noteBox.textContent = data.polishedNote;
          statusEl.textContent = 'Note polished!';
        } else {
          statusEl.textContent = 'Error: ' + (data.error || 'Failed');
        }
      })
      .catch(e => {
        statusEl.textContent = 'Error: ' + e.message;
      });
    }

    function copyNote() {
      navigator.clipboard.writeText(noteBox.textContent);
      statusEl.textContent = 'Copied to clipboard!';
    }

    function saveNote() {
      const blob = new Blob([noteBox.textContent], {type: 'text/plain'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'note-' + new Date().toISOString().split('T')[0] + '.txt';
      a.click();
      URL.revokeObjectURL(url);
      statusEl.textContent = 'Note saved!';
    }

    function showFeedback() {
      const section = document.getElementById('feedbackSection');
      section.style.display = section.style.display === 'none' ? 'block' : 'none';
    }

    function sendFeedback() {
      // Open Google Form in new tab
      window.open('https://docs.google.com/forms/d/e/1FAIpQLSePhzuaFIR6WwDINMza57DM8wSM0uEGzOfXN8wj_BlKgzIGxw/viewform?usp=publish_editor', '_blank');
      document.getElementById('feedbackSection').style.display = 'none';
      statusEl.textContent = 'Thanks for testing!';
    }
  </script>
</body>
</html>

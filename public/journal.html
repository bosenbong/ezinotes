<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Journal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #1a1a2e; min-height: 100vh; padding: 20px; }
    .app { max-width: 500px; margin: 0 auto; background: #fffef5; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    .header { background: linear-gradient(135deg, #ff6b6b, #feca57); color: white; padding: 20px; text-align: center; }
    .header h1 { font-size: 24px; }
    .tabs { display: flex; background: #ff6b6b; }
    .tab { flex: 1; padding: 15px; text-align: center; color: rgba(255,255,255,0.8); cursor: pointer; font-weight: bold; }
    .tab.active { background: #fffef5; color: #ff6b6b; }
    .section { padding: 20px; display: none; }
    .section.active { display: block; }
    .mood-picker { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
    .mood { font-size: 35px; padding: 8px; cursor: pointer; transition: transform 0.2s; }
    .mood:hover { transform: scale(1.2); }
    .mood.selected { background: #ffe66d; border-radius: 50%; }
    .record-btn { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #ff6b6b, #feca57); color: white; font-size: 50px; border: none; cursor: pointer; box-shadow: 0 5px 20px rgba(255,107,107,0.4); transition: all 0.3s; }
    .record-btn:hover { transform: scale(1.05); }
    .record-btn.recording { background: #ff4757; animation: pulse 0.5s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    .timer { text-align: center; font-size: 28px; font-weight: bold; margin: 10px 0; color: #ff6b6b; }
    .status { text-align: center; color: #666; margin-bottom: 15px; font-size: 14px; }
    .entry { background: #f8f9fa; padding: 20px; border-radius: 15px; margin: 15px 0; white-space: pre-wrap; font-size: 16px; line-height: 1.6; }
    .btn { padding: 14px 24px; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; border-radius: 10px; cursor: pointer; margin: 5px; font-weight: bold; }
    .btn-clear { background: linear-gradient(135deg, #ff4757, #ff6b6b); }
    .chat-messages { height: 200px; overflow-y: auto; background: #f5f5f5; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
    .chat-input { width: 70%; padding: 10px; border-radius: 5px; border: 1px solid #ddd; }
    .chat-send { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
    .page-nav { display: flex; justify-content: space-between; margin-top: 20px; }
    .nav-btn { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>📔 My Journal</h1>
    </div>
    <div class="tabs">
      <div class="tab active" id="tab1" onclick="showTab(1)">🎤 New</div>
      <div class="tab" id="tab2" onclick="showTab(2)">📖 Journal</div>
      <div class="tab" id="tab3" onclick="showTab(3)">💬 Chat</div>
    </div>
    
    <div id="section1" class="section active">
      <div class="mood-picker" id="moods">
        <span class="mood" onclick="selectMood(this)">😎</span>
        <span class="mood" onclick="selectMood(this)">🤩</span>
        <span class="mood" onclick="selectMood(this)">😐</span>
        <span class="mood" onclick="selectMood(this)">😢</span>
        <span class="mood" onclick="selectMood(this)">🥳</span>
      </div>
      <button class="record-btn" id="recordBtn" onclick="toggleRecord()">🎤</button>
      <div class="timer" id="timer">0:00</div>
      <div class="status" id="status">Tap mic to record</div>
      <div class="entry" id="entry" style="display:none;"></div>
      <div id="controls" style="display:none;">
        <button class="btn" onclick="saveEntry()">💾 Save</button>
        <button class="btn btn-clear" onclick="clearEntry()">🗑️ Clear</button>
      </div>
    </div>
    
    <div id="section2" class="section">
      <div id="journalPages"></div>
      <div class="page-nav">
        <button class="nav-btn" onclick="prevPage()">◀ Prev</button>
        <button class="nav-btn" onclick="nextPage()">Next ▶</button>
      </div>
    </div>
    
    <div id="section3" class="section">
      <div class="chat-messages" id="chatMsgs">
        <div style="background:#667eea;color:white;padding:10px;border-radius:10px;margin-bottom:10px;display:inline-block;">Hey! Ask me anything! 💬</div>
      </div>
      <div style="display:flex;gap:10px;">
        <input class="chat-input" id="chatInput" placeholder="Type message..." onkeypress="if(event.key==='Enter')sendChat()">
        <button class="chat-send" onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>

  <script>
    let selectedMood = '';
    let isRecording = false;
    let recognition = null;
    let timer = null;
    let seconds = 0;
    let transcript = '';
    let entries = JSON.parse(localStorage.getItem('entries') || '[]');
    let currentPage = 0;
    let chatHistory = [];
    
    function showTab(n) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i+1 === n));
      document.querySelectorAll('.section').forEach((s, i) => s.classList.toggle('active', i+1 === n));
      if (n === 2) renderJournal();
    }
    
    function selectMood(el) {
      document.querySelectorAll('.mood').forEach(m => m.classList.remove('selected'));
      el.classList.add('selected');
      selectedMood = el.textContent;
    }
    
    function toggleRecord() {
      if (isRecording) stopRecording();
      else startRecording();
    }
    
    function startRecording() {
      // Check mic permission first
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(function(stream) {
          stream.getTracks().forEach(track => track.stop());
          startSpeech();
        })
        .catch(function(err) {
          document.getElementById('status').textContent = 'Allow mic access!';
          alert('Please allow microphone permission');
        });
    }
    
    function startSpeech() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { alert('Use Chrome!'); return; }
      
      recognition = new SR();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      recognition.maxAlternatives = 1;
      
      recognition.onstart = function() {
        isRecording = true;
        transcript = '';
        seconds = 0;
        document.getElementById('recordBtn').classList.add('recording');
        document.getElementById('recordBtn').textContent = '⏹';
        document.getElementById('status').textContent = 'Listening... Talk now!';
        timer = setInterval(() => {
          seconds++;
          document.getElementById('timer').textContent = Math.floor(seconds/60) + ':' + String(seconds%60).padStart(2,'0');
        }, 1000);
      };
      
      recognition.onresult = function(e) {
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) transcript += e.results[i][0].transcript + ' ';
        }
      };
      
      recognition.onerror = function(event) {
        document.getElementById('status').textContent = 'Error: ' + event.error;
      };
      
      recognition.onend = function() { 
        if (isRecording) {
          try { recognition.start(); } catch(e) {}
        }
      };
      
      try { 
        recognition.start(); 
      } catch(e) { 
        document.getElementById('status').textContent = 'Error: ' + e.message;
      }
    }
    
    function stopRecording() {
      isRecording = false;
      if (recognition) recognition.stop();
      clearInterval(timer);
      document.getElementById('recordBtn').classList.remove('recording');
      document.getElementById('recordBtn').textContent = '🎤';
      
      if (transcript) {
        transcript = transcript.replace(/\bi\b/g, 'I').replace(/i'm/gi, "I'm");
        transcript = transcript.charAt(0).toUpperCase() + transcript.slice(1);
        if (!transcript.match(/[.!?]$/)) transcript += '.';
        
        document.getElementById('entry').textContent = selectedMood + ' ' + transcript;
        document.getElementById('entry').style.display = 'block';
        document.getElementById('controls').style.display = 'block';
        document.getElementById('status').textContent = 'Done!';
      } else {
        document.getElementById('status').textContent = 'No speech detected';
      }
    }
    
    function saveEntry() {
      const text = document.getElementById('entry').textContent;
      if (!text) return;
      entries.unshift({ mood: selectedMood, text: text, date: new Date().toLocaleString() });
      localStorage.setItem('entries', JSON.stringify(entries));
      alert('Saved!');
    }
    
    function clearEntry() {
      transcript = '';
      selectedMood = '';
      document.getElementById('entry').style.display = 'none';
      document.getElementById('controls').style.display = 'none';
      document.querySelectorAll('.mood').forEach(m => m.classList.remove('selected'));
    }
    
    function renderJournal() {
      const container = document.getElementById('journalPages');
      if (entries.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#999;">No entries yet!</p>';
        return;
      }
      const e = entries[currentPage];
      container.innerHTML = '<div class="entry"><strong>' + e.mood + '</strong> ' + e.text + '<br><small>' + e.date + '</small></div>';
    }
    
    function prevPage() { if (currentPage > 0) { currentPage--; renderJournal(); } }
    function nextPage() { if (currentPage < entries.length - 1) { currentPage++; renderJournal(); } }
    
    async function sendChat() {
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();
      if (!msg) return;
      
      const chatDiv = document.getElementById('chatMsgs');
      chatDiv.innerHTML += '<div style="background:#10b981;color:white;padding:8px;border-radius:10px;margin-bottom:10px;float:right;clear:both;">' + msg + '</div><div style="clear:both;"></div>';
      chatDiv.innerHTML += '<div style="background:#667eea;color:white;padding:8px;border-radius:10px;margin-bottom:10px;display:inline-block;">Thinking...</div>';
      input.value = '';
      chatDiv.scrollTop = chatDiv.scrollHeight;
      
      try {
        const res = await fetch('/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ message: msg, history: chatHistory }) });
        const data = await res.json();
        chatHistory.push({ role: 'user', content: msg });
        chatHistory.push({ role: 'assistant', content: data.response });
        chatDiv.innerHTML = chatDiv.innerHTML.replace('Thinking...', data.response || 'Thanks for chatting!');
      } catch(e) {
        chatDiv.innerHTML = chatDiv.innerHTML.replace('Thinking...', 'Oops! Try again.');
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>RAGE BAIT - The Game</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  </style>
</head>
<body>
<script>
// 🎮 MEME RAGE GAME - "RAGE BAIT"
let playerX = 50, playerY = 300, playerSize = 25, velocityY = 0, gravity = 0.6, jumpPower = -12, onGround = false, platforms = [], message = "", messageTimer = 0, gameOver = false, level = 1, deaths = 0, rageLevel = 0;

const messages = ["nice try lol", "L + ratio", "git gud 💀", "skill issue", "you fell for the bait", "EZ", "imposter syndrome", "NPC moment", "cringe", "NOT LIKE THIS", "LOOOOL"];

function setup() { createCanvas(600, 400); resetLevel(); }

function resetLevel() {
  playerX = 50; playerY = 300; velocityY = 0; gameOver = false;
  platforms = [
    {x: 0, y: 350, w: 200, h: 50, safe: true},
    {x: 250, y: 320, w: 80, h: 20, safe: true},
    {x: 380, y: 280, w: 80, h: 20, safe: false},
    {x: 500, y: 250, w: 100, h: 20, safe: true},
    {x: 100, y: 220, w: 60, h: 15, safe: true},
    {x: 200, y: 180, w: 60, h: 15, safe: false},
    {x: 300, y: 150, w: 60, h: 15, safe: true},
    {x: 400, y: 120, w: 80, h: 15, safe: false},
    {x: 520, y: 80, w: 60, h: 15, safe: true, goal: true}
  ];
}

function draw() {
  background(30, 30, 40);
  fill(255, 100, 100); textSize(12); text("RAGE: " + "🔥".repeat(min(rageLevel, 10)), 10, 20);
  text("Deaths: " + deaths, 10, 35); text("Level " + level, width - 80, 20);
  
  if (gameOver) {
    fill(255, 50, 50); textSize(40); textAlign(CENTER); text("GAME OVER", width/2, height/2 - 20);
    textSize(20); text(random(messages), width/2, height/2 + 30);
    textSize(16); text("Click to rage again", width/2, height/2 + 70); return;
  }
  
  if (messageTimer > 0) { messageTimer--; fill(255, 200, 0); textSize(24); textAlign(CENTER); text(message, width/2, 50); }
  
  velocityY += gravity; playerY += velocityY;
  onGround = false;
  
  for (let p of platforms) {
    if (playerX + playerSize/2 > p.x && playerX + playerSize/2 < p.x + p.w && playerY + playerSize > p.y && playerY + playerSize < p.y + p.h + 10 && velocityY >= 0) {
      if (!p.safe) { showMessage("💀 TRAP! 💀"); playerY = p.y + playerSize; die(); }
      else if (p.goal) { levelComplete(); }
      else { playerY = p.y - playerSize; velocityY = 0; onGround = true; }
    }
  }
  
  for (let p of platforms) {
    fill(p.safe || p.goal ? (p.goal ? color(255, 215, 0) : color(100, 255, 150)) : color(100, 255, 150));
    rect(p.x, p.y, p.w, p.h, 5);
  }
  
  fill(255, 100, 150); ellipse(playerX, playerY, playerSize);
  fill(255); ellipse(playerX - 5, playerY - 3, 8); ellipse(playerX + 5, playerY - 3, 8);
  fill(0); ellipse(playerX - 5, playerY - 3, 3); ellipse(playerX + 5, playerY - 3, 3);
  
  if (playerY > height + 50) die();
  if (keyIsDown(LEFT_ARROW)) playerX -= 5;
  if (keyIsDown(RIGHT_ARROW)) playerX += 5;
  playerX = constrain(playerX, 0, width - playerSize);
}

function keyPressed() {
  if ((key === ' ' || keyCode === UP_ARROW) && onGround) { velocityY = jumpPower; showMessage(random(["NOPE", "LMAO", "try again"])); }
  if (gameOver && key === ' ') resetLevel();
}

function mousePressed() { if (gameOver) resetLevel(); }

function die() { deaths++; rageLevel++; showMessage(random(messages)); playerX = 50; playerY = 300; velocityY = 0; gameOver = true; }

function levelComplete() { showMessage("LUCKY!"); level++; setTimeout(resetLevel, 1000); }

function showMessage(msg) { message = msg; messageTimer = 90; }
</script>
</body>
</html>

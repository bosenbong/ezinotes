<!DOCTYPE html>
<html>
<head>
  <title>Beat Box</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
    }
    h1 {
      color: #fff;
      margin-bottom: 10px;
    }
    p {
      color: #888;
      margin-bottom: 30px;
    }
    .pad-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .pad {
      width: 120px;
      height: 120px;
      border-radius: 20px;
      border: none;
      font-size: 40px;
      cursor: pointer;
      transition: all 0.1s;
      box-shadow: 0 8px 0 rgba(0,0,0,0.3);
    }
    .pad:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 rgba(0,0,0,0.3);
    }
    .pad1 { background: #ff6b6b; color: white; }
    .pad2 { background: #4ecdc4; color: white; }
    .pad3 { background: #ffe66d; color: #333; }
    .pad4 { background: #95e1d3; color: #333; }
    
    .controls {
      margin-top: 30px;
      display: flex;
      gap: 15px;
    }
    button.btn {
      padding: 15px 30px;
      border-radius: 10px;
      border: none;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }
    .play-btn { background: #4ecdc4; color: white; }
    .stop-btn { background: #ff6b6b; color: white; }
    .clear-btn { background: #666; color: white; }
    
    .recording {
      margin-top: 20px;
      color: #ff6b6b;
      font-size: 18px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>🥁 Beat Box</h1>
  <p>Tap the pads to make beats!</p>
  
  <div class="pad-container">
    <button class="pad pad1" onclick="playSound(1)">🥁</button>
    <button class="pad pad2" onclick="playSound(2)">🎹</button>
    <button class="pad pad3" onclick="playSound(3)">🎸</button>
    <button class="pad pad4" onclick="playSound(4)">🔊</button>
  </div>
  
  <div class="controls">
    <button class="btn play-btn" onclick="playBeat()">▶ Play Loop</button>
    <button class="btn stop-btn" onclick="stopBeat()">⏹ Stop</button>
    <button class="btn clear-btn" onclick="clearPattern()">🗑 Clear</button>
  </div>
  
  <div class="recording" id="recording">● Recording your beat...</div>

  <script>
    // Sound synthesis using Web Audio API
    let audioCtx = null;
    let pattern = [];
    let isPlaying = false;
    let beatInterval = null;
    let currentBeat = 0;
    
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }
    
    function playSound(num) {
      initAudio();
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      // Different sounds for each pad
      if (num === 1) { // Kick - low drum
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        gain.gain.setValueAtTime(1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      } else if (num === 2) { // Snare
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      } else if (num === 3) { // Hi-hat
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      } else if (num === 4) { // Bass
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(80, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      }
      
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.5);
      
      // Add to pattern
      pattern.push(num);
      updateDisplay();
    }
    
    function updateDisplay() {
      document.getElementById('recording').style.display = pattern.length > 0 ? 'block' : 'none';
    }
    
    function playBeat() {
      if (pattern.length === 0) {
        alert('Tap some pads first to make a beat!');
        return;
      }
      
      initAudio();
      isPlaying = true;
      currentBeat = 0;
      
      beatInterval = setInterval(() => {
        if (currentBeat < pattern.length) {
          playSound(pattern[currentBeat]);
          currentBeat++;
        } else {
          currentBeat = 0;
        }
      }, 400); // Speed of beat
    }
    
    function stopBeat() {
      isPlaying = false;
      clearInterval(beatInterval);
    }
    
    function clearPattern() {
      stopBeat();
      pattern = [];
      currentBeat = 0;
      updateDisplay();
    }
  </script>
</body>
</html>
